services:
  postgres:
    image: postgres:16-alpine
    container_name: concord-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: concord
      POSTGRES_PASSWORD: concord
      POSTGRES_DB: concord
    ports:
      - "5432:5432"
    volumes:
      - concord_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U concord -d concord"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  concord_pgdata:
